<mat-card>
	<mat-card-title>Layout</mat-card-title>
	<mat-card-content>
		<mat-slide-toggle [(ngModel)]="hasCover">has cover</mat-slide-toggle>
		<mat-slide-toggle [(ngModel)]="hasLayout">has default layout</mat-slide-toggle>
		<mat-slide-toggle [(ngModel)]="hasMaxWidth">has max width</mat-slide-toggle>
		<mat-slide-toggle [(ngModel)]="hasMainNavigation">has main navigation</mat-slide-toggle>
		<mat-slide-toggle [(ngModel)]="hasOffCanvas">has off-canvas</mat-slide-toggle>
		<mat-form-field>
			<mat-label>Collapse breakpoint</mat-label>
			<mat-select [(ngModel)]="breakpoint">
				@for (option of breakpointOptions; track $index) {
					<mat-option [value]="option">{{ option }}</mat-option>
				}
			</mat-select>
		</mat-form-field>
		<mat-form-field>
			<mat-label>home page route</mat-label>
			<input matInput type="text" [(ngModel)]="homePageRoute" />
		</mat-form-field>
	</mat-card-content>
</mat-card>
